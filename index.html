<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장성숲체원 기억 보관소</title>
    
    <!-- Tailwind CSS (CDN으로 바로 불러오기) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 고급 폰트 설정 -->
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;600&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f5f5f4; 
            margin: 0;
            padding: 0;
        }

        .font-serif-kr { font-family: 'Noto Serif KR', serif; }
        .font-gowun { font-family: 'Gowun Dodum', sans-serif; }
        .keep-all { word-break: keep-all; overflow-wrap: break-word; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .hidden-step { display: none !important; }
    </style>
</head>
<body class="bg-[#e7e5e4] min-h-screen flex items-center justify-center p-0 sm:p-4 md:p-8">

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-6xl bg-white sm:rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col min-h-screen sm:min-h-[700px] border-0 sm:border border-stone-200 relative">
        
        <!-- 상단 헤더 -->
        <div class="px-5 sm:px-10 py-4 sm:py-6 flex flex-col sm:flex-row justify-between items-center border-b border-stone-100 bg-white/90 backdrop-blur-md z-20 sticky top-0">
            <div class="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
                <img src="50436.png" alt="로고" class="h-8 sm:h-10 object-contain" onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='flex';">
                <div id="fallback-logo" class="hidden items-center gap-2 text-stone-800 font-serif-kr text-lg">
                    <i data-lucide="leaf" class="w-4 h-4 text-stone-400"></i> 장성숲체원
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4 mt-3 sm:mt-0 text-[11px] sm:text-sm font-medium text-stone-400">
                <span id="nav-step-1" class="transition-colors duration-300 text-stone-800 font-bold">1. 계절</span>
                <i data-lucide="chevron-right" class="w-3 h-3 opacity-50"></i>
                <span id="nav-step-2" class="transition-colors duration-300">2. 사진</span>
                <i data-lucide="chevron-right" class="w-3 h-3 opacity-50"></i>
                <span id="nav-step-3" class="transition-colors duration-300">3. 완성</span>
            </div>
        </div>

        <!-- 콘텐츠 영역 -->
        <div class="flex-1 p-5 sm:p-12 flex flex-col items-center justify-center relative bg-stone-50">
            
            <!-- STEP 1: 계절 선택 -->
            <div id="step-1" class="w-full text-center animate-fade-up max-w-5xl mt-4 sm:mt-0">
                <img src="50436.png" class="h-10 sm:h-12 mx-auto mb-6 sm:mb-8 object-contain opacity-60" onerror="this.style.display='none'">
                <h2 class="text-3xl sm:text-4xl lg:text-5xl font-serif-kr mb-4 sm:mb-6 text-stone-800 keep-all leading-tight">
                    당신의 장성숲체원은<br class="hidden sm:block"/> 어떤 계절이었나요?
                </h2>
                <p class="text-stone-500 mb-8 sm:mb-12 text-sm sm:text-lg font-gowun keep-all px-4">
                    가장 찬란했던 풍경을 선택하여 아름다운 액자를 완성해 보세요.
                </p>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6" id="season-buttons">
                    <!-- JS에서 버튼들이 동적으로 생성됩니다 -->
                </div>
            </div>

            <!-- STEP 2: 사진 업로드 -->
            <div id="step-2" class="hidden-step w-full text-center animate-fade-up flex-col items-center mt-4 sm:mt-0">
                <h2 id="step2-title" class="text-3xl sm:text-4xl font-serif-kr mb-3 sm:mb-4 keep-all">계절의 추억</h2>
                <p class="text-stone-500 mb-6 sm:mb-10 text-sm sm:text-lg font-gowun keep-all px-4">
                    선택하신 풍경 테마에 맞춰 고화질 갤러리 액자를 제작합니다.
                </p>
                
                <div id="upload-box" class="w-full max-w-[500px] aspect-square rounded-2xl border-[1.5px] border-dashed flex items-center justify-center relative overflow-hidden transition-all duration-300 hover:shadow-xl group bg-white mx-auto shadow-sm">
                    <div id="upload-bg-tint" class="absolute inset-0 opacity-[0.03]"></div>
                    <input type="file" id="photo-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                    
                    <div id="upload-default-ui" class="flex flex-col items-center gap-3 sm:gap-5 p-4 sm:p-8 transition-transform duration-500 group-hover:scale-105 relative z-10">
                        <div id="upload-icon-bg" class="w-16 h-16 sm:w-20 sm:h-20 rounded-full flex items-center justify-center shadow-sm">
                            <i data-lucide="upload-cloud" id="upload-icon" class="w-6 h-6 sm:w-8 sm:h-8" stroke-width="1.5"></i>
                        </div>
                        <div class="text-stone-700 font-serif-kr text-xl sm:text-2xl">여기를 터치하여 사진 선택</div>
                        <div class="text-stone-400 font-gowun text-xs sm:text-sm tracking-wide bg-stone-100 px-3 py-1 rounded-full">스마트폰 앨범에서 선택 가능</div>
                    </div>

                    <!-- 로딩 UI -->
                    <div id="loading-ui" class="hidden flex-col items-center gap-3 sm:gap-4 p-4 sm:p-8 relative z-10">
                        <div class="w-10 h-10 border-4 border-stone-200 border-t-stone-800 rounded-full animate-spin"></div>
                        <div class="text-stone-600 font-serif-kr text-lg mt-2">프레임 제작 중...</div>
                    </div>
                </div>
                
                <button onclick="handleReset()" class="mt-8 sm:mt-10 px-6 py-3 text-stone-500 hover:text-stone-800 font-gowun transition-colors active:scale-95 bg-white sm:bg-transparent rounded-full border sm:border-0 border-stone-200 shadow-sm sm:shadow-none">
                    ← 처음으로 돌아가기
                </button>
            </div>

            <!-- STEP 3: 결과 확인 및 다운로드 -->
            <div id="step-3" class="hidden-step w-full animate-fade-up flex-col lg:flex-row gap-8 lg:gap-16 items-center justify-center max-w-6xl mt-2 sm:mt-0">
                
                <div id="result-img-container" class="w-full flex-shrink-0 relative flex flex-col items-center">
                    <div class="absolute inset-0 bg-black/10 blur-xl translate-y-4 sm:translate-y-6 rounded-3xl"></div>
                    <img id="final-image" src="" alt="사계절 풍경 액자" class="w-full h-auto max-h-[50vh] sm:max-h-[65vh] object-contain block relative z-10 shadow-[0_15px_30px_rgba(0,0,0,0.15)] border border-stone-200/50 rounded-sm" />
                    
                    <div class="flex items-center gap-2 mt-5 text-xs text-stone-500 font-gowun bg-white/90 px-5 py-2.5 rounded-full border border-stone-200 shadow-sm relative z-10">
                        <i data-lucide="info" class="w-4 h-4 text-amber-500"></i>
                        <span>모바일에서는 이미지를 <strong>길게 눌러서 저장</strong>할 수 있습니다.</span>
                    </div>
                </div>

                <div class="flex flex-col gap-6 text-left max-w-md w-full px-4 sm:px-0">
                    <div class="text-center lg:text-left">
                        <h2 class="text-2xl sm:text-4xl lg:text-5xl font-serif-kr mb-3 sm:mb-5 text-stone-800 leading-tight keep-all">아름다운 풍경 속에<br/>추억이 담겼습니다.</h2>
                        <p id="result-desc" class="hidden sm:block text-stone-500 text-sm sm:text-lg leading-relaxed font-gowun keep-all"></p>
                    </div>

                    <div class="flex flex-col gap-3 mt-2">
                        <button id="download-btn" onclick="handleDownload()" class="w-full flex items-center justify-center gap-3 py-4 sm:py-5 px-6 rounded-xl sm:rounded-2xl font-serif-kr text-lg sm:text-xl text-white transition-all duration-300 active:scale-95 hover:shadow-lg hover:-translate-y-1 shadow-md">
                            <i data-lucide="download" class="w-5 h-5"></i> 고화질 이미지 저장
                        </button>
                        <button onclick="handleReset()" class="w-full flex items-center justify-center gap-2 py-4 px-6 rounded-xl sm:rounded-2xl font-gowun text-base sm:text-lg bg-stone-200/50 text-stone-700 hover:bg-stone-200 transition-colors active:scale-95 border border-transparent">
                            <i data-lucide="rotate-ccw" class="w-4 h-4 opacity-70"></i> 다른 사진으로 다시 만들기
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript 로직 -->
    <script>
        // 사계절 데이터
        const SEASON_DATA = {
            spring: { id: 'spring', name: '봄, 흩날리다', bgImage: 'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=1200&q=80', textColor: '#8e5568', accent: '#d8b4e2', icon: 'flower-2', fallbackColor: '#fdfbfb', desc: '따스한 햇살 아래, 벚꽃과 함께한 화사한 봄날의 기억' },
            summer: { id: 'summer', name: '여름, 짙어지다', bgImage: 'https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1200&q=80', textColor: '#3a5f4c', accent: '#8db596', icon: 'sun', fallbackColor: '#f7fbf9', desc: '싱그러운 잎사귀 사이로 스며든 눈부신 여름날의 활기' },
            autumn: { id: 'autumn', name: '가을, 물들다', bgImage: 'https://images.unsplash.com/photo-1477414348463-c0eb7f1359b6?auto=format&fit=crop&w=1200&q=80', textColor: '#7a4b3a', accent: '#d4a373', icon: 'leaf', fallbackColor: '#fdfbf8', desc: '붉게 물든 단풍길을 걸으며 나눈 깊고 따뜻한 가을의 정취' },
            winter: { id: 'winter', name: '겨울, 포근하다', bgImage: 'https://images.unsplash.com/photo-1453306458620-5bbef13a5bca?auto=format&fit=crop&w=1200&q=80', textColor: '#4a5b6c', accent: '#a2b9ce', icon: 'snowflake', fallbackColor: '#f8f9fa', desc: '소리 없이 내린 하얀 눈처럼 고요하고 포근했던 겨울날의 휴식' }
        };

        let currentSeason = null;
        let generatedImageUrl = null;

        // 아이콘 렌더링 시작
        lucide.createIcons();

        // 초기 화면 세팅 (버튼 동적 생성)
        const buttonsContainer = document.getElementById('season-buttons');
        Object.values(SEASON_DATA).forEach(season => {
            const btnHtml = `
                <button onclick="handleSeasonSelect('${season.id}')" class="group flex flex-col items-center p-6 sm:p-8 rounded-2xl transition-all duration-500 active:scale-95 hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_rgba(0,0,0,0.2)] relative overflow-hidden h-48 sm:h-64 justify-end border border-transparent hover:border-white/50 w-full">
                    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style="background-image: url('${season.bgImage}')"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-black/10 transition-opacity duration-300 group-hover:opacity-90"></div>
                    <div class="relative z-10 flex flex-col items-center text-white w-full">
                        <i data-lucide="${season.icon}" stroke-width="1.5" class="w-8 h-8 sm:w-10 sm:h-10 mb-2 sm:mb-3 opacity-90"></i>
                        <span class="text-xl sm:text-2xl font-serif-kr font-semibold mb-1 tracking-wide text-white">${season.name.split(',')[0]}</span>
                        <span class="hidden sm:block text-xs text-white/80 keep-all leading-relaxed font-gowun mt-1 px-4 text-center">${season.desc}</span>
                    </div>
                </button>
            `;
            buttonsContainer.innerHTML += btnHtml;
        });
        lucide.createIcons(); // 동적 생성 후 아이콘 리렌더링

        // 이미지 로드 유틸
        const loadImg = (src, isExternal = false) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                if (isExternal) img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('Load failed'));
                img.src = src;
            });
        };

        function setStep(step) {
            document.getElementById('step-1').classList.add('hidden-step');
            document.getElementById('step-2').classList.add('hidden-step');
            document.getElementById('step-2').classList.remove('flex');
            document.getElementById('step-3').classList.add('hidden-step');
            document.getElementById('step-3').classList.remove('flex');
            
            document.getElementById('nav-step-1').classList.remove('text-stone-800', 'font-bold');
            document.getElementById('nav-step-2').classList.remove('text-stone-800', 'font-bold');
            document.getElementById('nav-step-3').classList.remove('text-stone-800', 'font-bold');

            if (step === 1) {
                document.getElementById('step-1').classList.remove('hidden-step');
                document.getElementById('nav-step-1').classList.add('text-stone-800', 'font-bold');
            } else if (step === 2) {
                document.getElementById('step-2').classList.remove('hidden-step');
                document.getElementById('step-2').classList.add('flex');
                document.getElementById('nav-step-2').classList.add('text-stone-800', 'font-bold');
            } else if (step === 3) {
                document.getElementById('step-3').classList.remove('hidden-step');
                document.getElementById('step-3').classList.add('flex');
                document.getElementById('nav-step-3').classList.add('text-stone-800', 'font-bold');
            }
        }

        function handleSeasonSelect(seasonId) {
            currentSeason = SEASON_DATA[seasonId];
            
            // Step 2 디자인 설정
            document.getElementById('step2-title').innerText = `${currentSeason.name.split(',')[0]}의 추억`;
            document.getElementById('step2-title').style.color = currentSeason.textColor;
            document.getElementById('upload-box').style.borderColor = currentSeason.accent;
            document.getElementById('upload-bg-tint').style.backgroundColor = currentSeason.textColor;
            document.getElementById('upload-icon-bg').style.backgroundColor = currentSeason.fallbackColor;
            document.getElementById('upload-icon').style.color = currentSeason.textColor;
            
            // 입력 초기화
            document.getElementById('photo-input').value = "";
            setStep(2);
        }

        function handleReset() {
            currentSeason = null;
            generatedImageUrl = null;
            setStep(1);
        }

        // 사진 업로드 이벤트 연결
        document.getElementById('photo-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    generateFrame(event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        async function generateFrame(photoSrc) {
            // 로딩 UI 표시
            document.getElementById('photo-input').disabled = true;
            document.getElementById('upload-default-ui').style.display = 'none';
            document.getElementById('loading-ui').style.display = 'flex';

            try {
                await document.fonts.ready;
                
                const userImg = await loadImg(photoSrc);
                let bgImg = null;
                let logoImg = null;

                try { bgImg = await loadImg(currentSeason.bgImage, true); } catch(e) {}
                try { logoImg = await loadImg('50436.png'); } catch(e) {}

                const isLandscape = userImg.width > userImg.height;
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                const cw = isLandscape ? 1500 : 1200; 
                const ch = isLandscape ? 1200 : 1500; 
                canvas.width = cw;
                canvas.height = ch;

                // 배경 그리기
                if (bgImg) {
                    const bgRatio = bgImg.width / bgImg.height;
                    const canvasRatio = cw / ch;
                    let bgSx, bgSy, bgSw, bgSh;
                    if (bgRatio > canvasRatio) {
                        bgSh = bgImg.height; bgSw = bgImg.height * canvasRatio; bgSx = (bgImg.width - bgSw) / 2; bgSy = 0;
                    } else {
                        bgSw = bgImg.width; bgSh = bgImg.width / canvasRatio; bgSx = 0; bgSy = (bgImg.height - bgSh) / 2;
                    }
                    ctx.drawImage(bgImg, bgSx, bgSy, bgSw, bgSh, 0, 0, cw, ch);
                    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
                    ctx.fillRect(0, 0, cw, ch);
                } else {
                    ctx.fillStyle = currentSeason.fallbackColor;
                    ctx.fillRect(0, 0, cw, ch);
                }

                // 매트 그리기
                const matteMargin = 80;
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.shadowBlur = 40;
                ctx.shadowOffsetY = 15;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(matteMargin, matteMargin, cw - matteMargin*2, ch - matteMargin*2);
                ctx.shadowColor = "transparent";

                ctx.strokeStyle = "rgba(0,0,0,0.06)";
                ctx.lineWidth = 1;
                ctx.strokeRect(matteMargin+15, matteMargin+15, cw - matteMargin*2 - 30, ch - matteMargin*2 - 30);

                // 사진 그리기
                const photoMargin = 60;
                const targetX = matteMargin + photoMargin;
                const targetY = matteMargin + photoMargin;
                const targetW = cw - matteMargin*2 - photoMargin*2;
                const targetH = ch - matteMargin*2 - photoMargin - 320;

                const imgRatio = userImg.width / userImg.height;
                const targetRatio = targetW / targetH;
                let sX, sY, sW, sH;

                if (imgRatio > targetRatio) {
                    sH = userImg.height; sW = userImg.height * targetRatio; sX = (userImg.width - sW) / 2; sY = 0;
                } else {
                    sW = userImg.width; sH = userImg.width / targetRatio; sX = 0; sY = (userImg.height - sH) / 2;
                }

                ctx.drawImage(userImg, sX, sY, sW, sH, targetX, targetY, targetW, targetH);
                ctx.strokeStyle = "rgba(0,0,0,0.1)";
                ctx.strokeRect(targetX, targetY, targetW, targetH);

                // 텍스트 그리기
                const textCenterY = targetY + targetH + 90;
                ctx.fillStyle = currentSeason.textColor;
                ctx.textAlign = 'center';
                ctx.font = '400 55px "Noto Serif KR", serif';
                ctx.fillText(`장성숲체원에서의 기억`, cw / 2, textCenterY);
                
                ctx.beginPath();
                ctx.moveTo(cw / 2 - 35, textCenterY + 45);
                ctx.lineTo(cw / 2 + 35, textCenterY + 45);
                ctx.strokeStyle = currentSeason.accent;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.font = '32px "Gowun Dodum", "Pretendard", sans-serif';
                ctx.fillStyle = '#6b7280'; 
                ctx.fillText(currentSeason.desc, cw / 2, textCenterY + 110);

                // 로고 그리기
                if (logoImg) {
                    const logoH = 55; 
                    const logoW = logoImg.width * (logoH / logoImg.height); 
                    ctx.drawImage(logoImg, cw/2 - logoW/2, ch - matteMargin - logoH - 40, logoW, logoH);
                } else {
                    ctx.font = '300 22px "Pretendard", sans-serif';
                    ctx.fillStyle = '#9ca3af';
                    ctx.fillText(`KOREA FOREST WELFARE INSTITUTE`, cw / 2, ch - matteMargin - 50);
                }

                generatedImageUrl = canvas.toDataURL('image/png', 1.0);
                
                // 결과 UI 업데이트
                document.getElementById('final-image').src = generatedImageUrl;
                document.getElementById('result-img-container').className = `w-full flex-shrink-0 relative flex flex-col items-center ${isLandscape ? 'max-w-[550px]' : 'max-w-[320px] sm:max-w-[420px]'}`;
                document.getElementById('result-desc').innerText = `장성숲체원의 ${currentSeason.name.split(',')[0]} 풍경을 액자 프레임으로 활용하여 갤러리 감성의 작품을 완성했습니다. 기기에 저장하여 오랫동안 간직해 보세요.`;
                document.getElementById('download-btn').style.backgroundColor = currentSeason.textColor;

                setStep(3);
            } catch (error) {
                alert("이미지 처리 중 오류가 발생했습니다.");
                console.error(error);
            } finally {
                document.getElementById('photo-input').disabled = false;
                document.getElementById('upload-default-ui').style.display = 'flex';
                document.getElementById('loading-ui').style.display = 'none';
            }
        }

        async function handleDownload() {
            if (!generatedImageUrl) return;
            try {
                const response = await fetch(generatedImageUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = `Jangseong_Memory_${currentSeason.id}.png`;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                setTimeout(() => window.URL.revokeObjectURL(blobUrl), 200);
            } catch (error) {
                alert("다운로드가 차단되었습니다. 모바일 환경이라면 이미지를 길게 눌러서 '사진 저장'을 선택해주세요.");
            }
        }
    </script>
</body>
</html>
